name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      skip_tests:
        description: 'Skip smoke tests (emergency deploy)'
        type: boolean
        default: false

concurrency:
  group: deploy-production
  cancel-in-progress: false  # Never cancel a running deploy

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}
  NODE_VERSION: '20'

jobs:
  # ------------------------------------------
  # Build & Push — frontend, backend, agent in parallel
  # ------------------------------------------
  build:
    name: Build & Push → ${{ matrix.service }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: true
      matrix:
        include:
          - service: frontend
            context: ./frontend
            dockerfile: ./frontend/Dockerfile
          - service: backend
            context: ./backend
            dockerfile: ./backend/Dockerfile
          - service: agent
            context: ./agent
            dockerfile: ./agent/Dockerfile

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase image name
        id: image_name
        run: echo "value=$(echo '${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.service }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ steps.image_name.outputs.value }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest

      - name: Resolve build args
        id: buildargs
        env:
          PRODUCTION_API_URL: ${{ secrets.PRODUCTION_API_URL }}
          PRODUCTION_AGENT_URL: ${{ secrets.PRODUCTION_AGENT_URL }}
        run: |
          if [ "${{ matrix.service }}" = "frontend" ]; then
            {
              echo 'args<<EOF'
              echo "NEXT_PUBLIC_API_URL=${PRODUCTION_API_URL}/api/v1"
              echo "NEXT_PUBLIC_AGENT_URL=${PRODUCTION_AGENT_URL}"
              echo 'EOF'
            } >> $GITHUB_OUTPUT
          else
            echo "args=" >> $GITHUB_OUTPUT
          fi

      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: ${{ steps.buildargs.outputs.args }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  # ------------------------------------------
  # Deploy all services to VPS via SSH
  # Migrations run inside Docker network via the
  # `migrate` service in docker-compose.prod.yml
  # ------------------------------------------
  deploy:
    name: Deploy → VPS
    runs-on: ubuntu-latest
    needs: build
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Compute short SHA
        id: sha
        run: echo "short=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Lowercase image prefix
        id: lower
        run: echo "prefix=$(echo '${{ env.IMAGE_PREFIX }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e

            # Sync config files from repo
            # First deploy: /opt/careermate exists but has no .git → init in-place
            # (.env.production is gitignored so reset --hard won't touch it)
            REPO_URL="https://github.com/${{ github.repository }}.git"
            mkdir -p /opt/careermate
            if [ -d /opt/careermate/.git ]; then
              git -C /opt/careermate pull origin main
            else
              git -C /opt/careermate init
              git -C /opt/careermate remote add origin "$REPO_URL"
              git -C /opt/careermate fetch --depth=1 origin main
              git -C /opt/careermate reset --hard FETCH_HEAD
            fi

            cd /opt/careermate

            # Authenticate with GHCR
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

            # Export new image references (lowercase — Docker requires lowercase repo names)
            export FRONTEND_IMAGE="${{ env.REGISTRY }}/${{ steps.lower.outputs.prefix }}-frontend:sha-${{ steps.sha.outputs.short }}"
            export BACKEND_IMAGE="${{ env.REGISTRY }}/${{ steps.lower.outputs.prefix }}-backend:sha-${{ steps.sha.outputs.short }}"
            export AGENT_IMAGE="${{ env.REGISTRY }}/${{ steps.lower.outputs.prefix }}-agent:sha-${{ steps.sha.outputs.short }}"

            echo "Pulling images..."
            docker pull "$FRONTEND_IMAGE"
            docker pull "$BACKEND_IMAGE"
            docker pull "$AGENT_IMAGE"

            COMPOSE="docker compose -f devops/docker/docker-compose.prod.yml --env-file .env.production"

            # Run migrations (one-off, waits for postgres)
            echo "Running migrations..."
            $COMPOSE run --rm migrate

            # Rolling restart of app services (nginx must be explicit — it depends on app services, not vice versa)
            $COMPOSE up -d --no-build --remove-orphans frontend backend agent nginx

            # Wait for backend (up to 120s)
            echo "Waiting for backend..."
            timeout 120 bash -c \
              'until curl -sf http://localhost/api/v1/health > /dev/null; do sleep 3; done' \
              || { echo "Backend health check timed out"; exit 1; }

            # Wait for agent (up to 120s) — GET or POST /ai/health via nginx
            echo "Waiting for agent..."
            timeout 120 bash -c \
              'until curl -sf http://localhost/ai/health > /dev/null 2>&1 || curl -sf -X POST http://localhost/ai/health > /dev/null 2>&1; do sleep 3; done' \
              || {
                echo "Agent health check timed out — container status:"
                docker inspect --format="Status={{.State.Status}} Health={{.State.Health.Status}}" careermate-agent 2>/dev/null || true
                echo "Agent logs (last 40 lines):"
                docker logs --tail 40 careermate-agent 2>&1 || true
                exit 1
              }

            # Wait for nginx/frontend (up to 60s) — /health is handled by nginx directly
            echo "Waiting for nginx..."
            timeout 60 bash -c \
              'until curl -sf http://localhost/health > /dev/null; do sleep 3; done' \
              || { echo "Nginx health check timed out"; exit 1; }

            # Clean up dangling images
            docker image prune -f --filter "dangling=true"

            echo "Deploy complete ✓"

  # ------------------------------------------
  # Smoke Tests — verify production is alive
  # ------------------------------------------
  smoke-test:
    name: Smoke Tests
    runs-on: ubuntu-latest
    needs: deploy
    if: ${{ !inputs.skip_tests }}

    steps:
      - name: Check Backend Health
        run: |
          for i in $(seq 1 6); do
            echo "Attempt $i..."
            if curl -sf --max-time 10 "${{ secrets.PRODUCTION_API_URL }}/api/v1/health"; then
              echo "Backend is healthy ✓"
              exit 0
            fi
            sleep 10
          done
          echo "Backend smoke test failed after retries"
          exit 1

      - name: Check Agent Health
        run: |
          for i in $(seq 1 6); do
            echo "Attempt $i..."
            if curl -sf --max-time 10 "${{ secrets.PRODUCTION_API_URL }}/ai/health"; then
              echo "Agent is healthy ✓"
              exit 0
            fi
            sleep 10
          done
          echo "Agent smoke test failed after retries"
          exit 1

      - name: Notify success
        if: success()
        continue-on-error: true
        uses: 8398a7/action-slack@v3
        with:
          status: success
          text: |
            ✅ *Production deploy successful*
            Commit: `${{ github.sha }}`
            Author: ${{ github.actor }}
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}

      - name: Notify failure
        if: failure()
        continue-on-error: true
        uses: 8398a7/action-slack@v3
        with:
          status: failure
          text: |
            ❌ *Production smoke test FAILED*
            Commit: `${{ github.sha }}`
            Author: ${{ github.actor }}
            Action: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
