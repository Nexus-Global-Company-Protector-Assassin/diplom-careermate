name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      skip_tests:
        description: 'Skip smoke tests (emergency deploy)'
        type: boolean
        default: false

concurrency:
  group: deploy-production
  cancel-in-progress: false  # Never cancel a running deploy

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}
  NODE_VERSION: '20'

jobs:
  # ------------------------------------------
  # Build & Push — backend and agent in parallel
  # Frontend goes to Vercel directly (no Docker needed)
  # ------------------------------------------
  build:
    name: Build & Push → ${{ matrix.service }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: true
      matrix:
        include:
          - service: backend
            context: ./backend
            dockerfile: ./backend/Dockerfile
          - service: agent
            context: ./agent
            dockerfile: ./agent/Dockerfile

    outputs:
      image-tag: ${{ steps.meta.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.service }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest

      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  # ------------------------------------------
  # Frontend — deploy to Vercel
  # Runs in parallel with Docker builds
  # ------------------------------------------
  deploy-frontend:
    name: Deploy Frontend → Vercel
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'
          working-directory: ./frontend

  # ------------------------------------------
  # Migrations — runs AFTER new image is built,
  # BEFORE new backend containers start
  # ------------------------------------------
  migrate:
    name: Run DB Migrations
    runs-on: ubuntu-latest
    needs: build
    environment: production

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache backend deps
        uses: actions/cache@v4
        with:
          path: backend/node_modules
          key: backend-${{ hashFiles('backend/package-lock.json') }}

      - name: Install deps
        run: npm ci
        working-directory: ./backend

      - name: Run Prisma migrations
        run: npx prisma migrate deploy
        working-directory: ./backend
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

  # ------------------------------------------
  # Deploy Backend + Agent to VPS via SSH
  # Pulls pre-built images from GHCR, rolling restart
  # ------------------------------------------
  deploy-backend:
    name: Deploy Backend & Agent → VPS
    runs-on: ubuntu-latest
    needs: [build, migrate]
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Compute short SHA
        id: sha
        run: echo "short=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /opt/careermate

            # Authenticate with GHCR
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

            # Export new image references
            export BACKEND_IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-backend:sha-${{ steps.sha.outputs.short }}"
            export AGENT_IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-agent:sha-${{ steps.sha.outputs.short }}"

            echo "Pulling $BACKEND_IMAGE"
            docker pull "$BACKEND_IMAGE"

            echo "Pulling $AGENT_IMAGE"
            docker pull "$AGENT_IMAGE"

            # Rolling restart — docker compose replaces containers one by one
            docker compose -f devops/docker/docker-compose.prod.yml \
              up -d --no-build --remove-orphans \
              backend agent

            # Wait for backend to become healthy (up to 120s)
            echo "Waiting for backend..."
            timeout 120 bash -c \
              'until curl -sf http://localhost:3001/api/v1/health > /dev/null; do sleep 3; done' \
              || { echo "Backend health check timed out"; exit 1; }

            # Wait for agent to become healthy (up to 60s)
            echo "Waiting for agent..."
            timeout 60 bash -c \
              'until curl -sf http://localhost:3002/health > /dev/null; do sleep 3; done' \
              || { echo "Agent health check timed out"; exit 1; }

            # Clean up dangling images (project-scoped only)
            docker image prune -f --filter "dangling=true"

            echo "Deploy complete ✓"

  # ------------------------------------------
  # Smoke Tests — verify production is alive
  # ------------------------------------------
  smoke-test:
    name: Smoke Tests
    runs-on: ubuntu-latest
    needs: [deploy-frontend, deploy-backend]
    if: ${{ !inputs.skip_tests }}

    steps:
      - name: Check Backend Health
        run: |
          for i in $(seq 1 6); do
            echo "Attempt $i..."
            if curl -sf --max-time 10 "${{ secrets.PRODUCTION_API_URL }}/api/v1/health"; then
              echo "Backend is healthy ✓"
              exit 0
            fi
            sleep 10
          done
          echo "Backend smoke test failed after retries"
          exit 1

      - name: Check Frontend
        run: |
          curl -sf --max-time 15 "${{ secrets.PRODUCTION_FRONTEND_URL }}" \
            || { echo "Frontend smoke test failed"; exit 1; }
          echo "Frontend is healthy ✓"

      - name: Notify success
        if: success()
        uses: 8398a7/action-slack@v3
        with:
          status: success
          text: |
            ✅ *Production deploy successful*
            Commit: `${{ github.sha }}`
            Author: ${{ github.actor }}
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}

      - name: Notify failure
        if: failure()
        uses: 8398a7/action-slack@v3
        with:
          status: failure
          text: |
            ❌ *Production smoke test FAILED*
            Commit: `${{ github.sha }}`
            Author: ${{ github.actor }}
            Action: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
