name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# Cancel in-progress runs for the same branch on new push
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'

jobs:
  # ------------------------------------------
  # Detect which services actually changed
  # Skips unnecessary jobs on unrelated changes
  # ------------------------------------------
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend:  ${{ steps.filter.outputs.backend }}
      agent:    ${{ steps.filter.outputs.agent }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - 'frontend/**'
              - 'package.json'
              - '.github/workflows/ci.yml'
            backend:
              - 'backend/**'
              - 'package.json'
              - '.github/workflows/ci.yml'
            agent:
              - 'agent/**'
              - 'package.json'
              - '.github/workflows/ci.yml'

  # ------------------------------------------
  # Lint & Type Check
  # Runs per-service in parallel steps, only for changed services
  # ------------------------------------------
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    needs: changes

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      # Frontend
      - name: Cache frontend deps
        if: needs.changes.outputs.frontend == 'true'
        uses: actions/cache@v4
        with:
          path: frontend/node_modules
          key: frontend-${{ hashFiles('frontend/package-lock.json') }}

      - name: Install frontend deps
        if: needs.changes.outputs.frontend == 'true'
        run: npm ci
        working-directory: ./frontend

      - name: Lint frontend
        if: needs.changes.outputs.frontend == 'true'
        run: npm run lint
        working-directory: ./frontend

      - name: Type-check frontend
        if: needs.changes.outputs.frontend == 'true'
        run: npm run type-check || npx tsc --noEmit
        working-directory: ./frontend

      # Backend
      - name: Cache backend deps
        if: needs.changes.outputs.backend == 'true'
        uses: actions/cache@v4
        with:
          path: backend/node_modules
          key: backend-${{ hashFiles('backend/package-lock.json') }}

      - name: Install backend deps
        if: needs.changes.outputs.backend == 'true'
        run: npm ci
        working-directory: ./backend

      - name: Lint backend
        if: needs.changes.outputs.backend == 'true'
        run: npm run lint
        working-directory: ./backend

      - name: Build backend (type-check)
        if: needs.changes.outputs.backend == 'true'
        run: npm run build
        working-directory: ./backend

      # Agent
      - name: Cache agent deps
        if: needs.changes.outputs.agent == 'true'
        uses: actions/cache@v4
        with:
          path: agent/node_modules
          key: agent-${{ hashFiles('agent/package-lock.json') }}

      - name: Install agent deps
        if: needs.changes.outputs.agent == 'true'
        run: npm ci
        working-directory: ./agent

      - name: Type-check agent
        if: needs.changes.outputs.agent == 'true'
        run: npx tsc --noEmit
        working-directory: ./agent

  # ------------------------------------------
  # Backend Unit + Integration Tests
  # Uses real Postgres + Redis via services
  # ------------------------------------------
  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.backend == 'true'

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: careermate_test
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache backend deps
        uses: actions/cache@v4
        with:
          path: backend/node_modules
          key: backend-${{ hashFiles('backend/package-lock.json') }}

      - name: Install deps
        run: npm ci
        working-directory: ./backend

      - name: Generate Prisma client
        run: npx prisma generate
        working-directory: ./backend

      - name: Run migrations
        run: npx prisma migrate deploy
        working-directory: ./backend
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/careermate_test

      - name: Run tests with coverage
        run: npm run test:cov
        working-directory: ./backend
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/careermate_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: ci-test-secret-not-for-production
          NODE_ENV: test

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: ./backend/coverage/lcov.info
          flags: backend
          token: ${{ secrets.CODECOV_TOKEN }}

  # ------------------------------------------
  # Agent Tests
  # ------------------------------------------
  test-agent:
    name: Test Agent
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.agent == 'true'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache agent deps
        uses: actions/cache@v4
        with:
          path: agent/node_modules
          key: agent-${{ hashFiles('agent/package-lock.json') }}

      - name: Install deps
        run: npm ci
        working-directory: ./agent

      - name: Run tests
        run: npm run test
        working-directory: ./agent
        env:
          NODE_ENV: test

  # ------------------------------------------
  # Security — Trivy fs scan, results to GitHub Security tab
  # ------------------------------------------
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    permissions:
      security-events: write

    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy (CRITICAL + HIGH only)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: '0'

      - name: Upload to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

  # ------------------------------------------
  # Gate — required status check for branch protection
  # Passes only if all required jobs succeeded or were skipped
  # ------------------------------------------
  ci-gate:
    name: CI Gate
    runs-on: ubuntu-latest
    needs: [lint, test-backend, test-agent, security]
    if: always()
    steps:
      - name: Evaluate results
        run: |
          results="${{ needs.lint.result }} ${{ needs.test-backend.result }} ${{ needs.test-agent.result }} ${{ needs.security.result }}"
          echo "Job results: $results"
          for result in $results; do
            if [[ "$result" == "failure" || "$result" == "cancelled" ]]; then
              echo "❌ Required check failed: $result"
              exit 1
            fi
          done
          echo "✅ All checks passed (or skipped)"
