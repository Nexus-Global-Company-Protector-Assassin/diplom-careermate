version: '3.8'

# Images are pulled from GHCR — set these env vars before running:
#   BACKEND_IMAGE=ghcr.io/your-org/careermate-backend:sha-abc1234
#   AGENT_IMAGE=ghcr.io/your-org/careermate-agent:sha-abc1234
# Or just use :latest tags if you always want the newest build.
#
# All secrets are read from .env.production (never committed to git).

services:

  # ------------------------------------------
  # DB Migrations — runs once, then exits
  # Must complete before backend starts
  # ------------------------------------------
  migrate:
    image: ${BACKEND_IMAGE:-ghcr.io/change-me/careermate-backend:latest}
    command: npx prisma migrate deploy
    environment:
      DATABASE_URL: ${DATABASE_URL}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    networks:
      - careermate-network

  # ------------------------------------------
  # Backend (NestJS)
  # ------------------------------------------
  backend:
    image: ${BACKEND_IMAGE:-ghcr.io/change-me/careermate-backend:latest}
    container_name: careermate-backend
    restart: always
    expose:
      - "3001"
    environment:
      NODE_ENV: production

      # Database
      DATABASE_URL: ${DATABASE_URL}

      # Redis
      REDIS_URL: ${REDIS_URL}

      # JWT
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_ACCESS_TOKEN_EXPIRATION: ${JWT_ACCESS_TOKEN_EXPIRATION:-15m}
      JWT_REFRESH_TOKEN_EXPIRATION: ${JWT_REFRESH_TOKEN_EXPIRATION:-7d}

      # Google OAuth
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_CALLBACK_URL: ${GOOGLE_CALLBACK_URL}
      FRONTEND_URL: ${FRONTEND_URL}

      # Email (Resend)
      RESEND_API_KEY: ${RESEND_API_KEY}
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL:-CareerMate <onboarding@resend.dev>}

      # CORS
      CORS_ORIGIN: ${CORS_ORIGIN}

      # LLM (Polza.ai / OpenAI-compatible)
      LLM_API_BASE_URL: ${LLM_API_BASE_URL}
      LLM_API_KEY: ${LLM_API_KEY}
      LLM_MODEL_NAME: ${LLM_MODEL_NAME:-gpt-4o}
      LLM_MODEL_NAME_FAST: ${LLM_MODEL_NAME_FAST:-gpt-4o-mini}
      LLM_MODEL_NAME_SMART: ${LLM_MODEL_NAME_SMART:-gpt-4o}
      EMBEDDINGS_MODEL_NAME: ${EMBEDDINGS_MODEL_NAME:-text-embedding-3-small}
      AI_TIMEOUT_MS: ${AI_TIMEOUT_MS:-60000}
      AI_MAX_RETRIES: ${AI_MAX_RETRIES:-3}

      # Qdrant vector search
      QDRANT_URL: ${QDRANT_URL}
      QDRANT_API_KEY: ${QDRANT_API_KEY}
      QDRANT_COLLECTION: ${QDRANT_COLLECTION:-careermate-vacancies}

      # Neo4j Knowledge Graph (AuraDB cloud)
      NEO4J_URI: ${NEO4J_URI:-}
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-}
      NEO4J_DATABASE: ${NEO4J_DATABASE:-neo4j}

      # Object Storage (S3 / R2 / MinIO)
      STORAGE_ENDPOINT: ${STORAGE_ENDPOINT:-}
      STORAGE_ACCESS_KEY: ${STORAGE_ACCESS_KEY:-}
      STORAGE_SECRET_KEY: ${STORAGE_SECRET_KEY:-}
      STORAGE_BUCKET: ${STORAGE_BUCKET:-}

      # Job board APIs
      ADZUNA_APP_ID: ${ADZUNA_APP_ID:-}
      ADZUNA_APP_KEY: ${ADZUNA_APP_KEY:-}
      ADZUNA_COUNTRY: ${ADZUNA_COUNTRY:-gb}

      # Freemium quotas
      QUOTA_AI_DAILY: ${QUOTA_AI_DAILY:-10}
      QUOTA_RESUMES: ${QUOTA_RESUMES:-3}
      QUOTA_QUIZ: ${QUOTA_QUIZ:-3}

    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    networks:
      - careermate-network
    deploy:
      resources:
        limits:
          memory: 768m
          cpus: '0.75'
        reservations:
          memory: 256m

  # ------------------------------------------
  # Agent (AI service)
  # ------------------------------------------
  agent:
    image: ${AGENT_IMAGE:-ghcr.io/change-me/careermate-agent:latest}
    container_name: careermate-agent
    restart: always
    expose:
      - "3002"
    environment:
      NODE_ENV: production
      AGENT_PORT: 3002

      # LLM
      LLM_API_BASE_URL: ${LLM_API_BASE_URL}
      LLM_API_KEY: ${LLM_API_KEY}
      LLM_MODEL_NAME: ${LLM_MODEL_NAME:-gpt-4o}
      LLM_MODEL_NAME_FAST: ${LLM_MODEL_NAME_FAST:-gpt-4o-mini}
      LLM_MODEL_NAME_SMART: ${LLM_MODEL_NAME_SMART:-gpt-4o}

      # Redis cache
      REDIS_URL: ${REDIS_URL}

      # Pinecone (legacy, kept for backwards compat — Qdrant is primary)
      PINECONE_API_KEY: ${PINECONE_API_KEY:-}

    depends_on:
      - backend
    networks:
      - careermate-network
    deploy:
      resources:
        limits:
          memory: 768m
          cpus: '0.75'
        reservations:
          memory: 256m

  # ------------------------------------------
  # Frontend (Next.js)
  # ------------------------------------------
  frontend:
    image: ${FRONTEND_IMAGE:-ghcr.io/change-me/careermate-frontend:latest}
    container_name: careermate-frontend
    restart: always
    expose:
      - "3000"
    environment:
      NODE_ENV: production
      HOSTNAME: "0.0.0.0"
      PORT: 3000
    depends_on:
      - backend
    networks:
      - careermate-network
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '0.5'
        reservations:
          memory: 128m

  # ------------------------------------------
  # Nginx — reverse proxy
  # HTTP only until domain + SSL are configured
  # ------------------------------------------
  nginx:
    image: nginx:alpine
    container_name: careermate-nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
      - agent
    networks:
      - careermate-network
    deploy:
      resources:
        limits:
          memory: 64m
          cpus: '0.1'

  # ------------------------------------------
  # PostgreSQL
  # ------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: careermate-postgres
    restart: always
    expose:
      - "5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - careermate-network
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '0.5'

  # ------------------------------------------
  # Redis
  # ------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: careermate-redis
    restart: always
    expose:
      - "6379"
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - careermate-network
    deploy:
      resources:
        limits:
          memory: 320m
          cpus: '0.25'

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  careermate-network:
    driver: bridge
