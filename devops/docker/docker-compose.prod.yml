version: '3.8'

# Images are pulled from GHCR — set these env vars before running:
#   BACKEND_IMAGE=ghcr.io/your-org/careermate-backend:sha-abc1234
#   AGENT_IMAGE=ghcr.io/your-org/careermate-agent:sha-abc1234
# Or just use :latest tags if you always want the newest build.

services:

  # ------------------------------------------
  # DB Migrations — runs once, then exits
  # Must complete before backend starts
  # ------------------------------------------
  migrate:
    image: ${BACKEND_IMAGE:-ghcr.io/change-me/careermate-backend:latest}
    command: npx prisma migrate deploy
    environment:
      DATABASE_URL: ${DATABASE_URL}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    networks:
      - careermate-network

  # ------------------------------------------
  # Backend (NestJS)
  # ------------------------------------------
  backend:
    image: ${BACKEND_IMAGE:-ghcr.io/change-me/careermate-backend:latest}
    container_name: careermate-backend
    restart: always
    expose:
      - "3001"
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      JWT_SECRET: ${JWT_SECRET}
      LLM_API_KEY: ${LLM_API_KEY}
      PINECONE_API_KEY: ${PINECONE_API_KEY}
      STORAGE_ENDPOINT: ${STORAGE_ENDPOINT}
      STORAGE_ACCESS_KEY: ${STORAGE_ACCESS_KEY}
      STORAGE_SECRET_KEY: ${STORAGE_SECRET_KEY}
      STORAGE_BUCKET: ${STORAGE_BUCKET}
      ADZUNA_APP_ID: ${ADZUNA_APP_ID:-}
      ADZUNA_APP_KEY: ${ADZUNA_APP_KEY:-}
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    networks:
      - careermate-network
    deploy:
      resources:
        limits:
          memory: 768m
          cpus: '0.75'
        reservations:
          memory: 256m

  # ------------------------------------------
  # Agent (AI service)
  # ------------------------------------------
  agent:
    image: ${AGENT_IMAGE:-ghcr.io/change-me/careermate-agent:latest}
    container_name: careermate-agent
    restart: always
    expose:
      - "3002"
    environment:
      NODE_ENV: production
      PORT: 3002
      LLM_API_KEY: ${LLM_API_KEY}
      PINECONE_API_KEY: ${PINECONE_API_KEY}
    depends_on:
      - backend
    networks:
      - careermate-network
    deploy:
      resources:
        limits:
          memory: 768m
          cpus: '0.75'
        reservations:
          memory: 256m

  # ------------------------------------------
  # Nginx — reverse proxy + SSL termination
  # ------------------------------------------
  nginx:
    image: nginx:alpine
    container_name: careermate-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx_ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - agent
    networks:
      - careermate-network
    deploy:
      resources:
        limits:
          memory: 64m
          cpus: '0.1'

  # ------------------------------------------
  # PostgreSQL
  # ------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: careermate-postgres
    restart: always
    # No ports: — DB accessible only within careermate-network
    expose:
      - "5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - careermate-network
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '0.5'

  # ------------------------------------------
  # Redis
  # ------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: careermate-redis
    restart: always
    # No ports: — Redis accessible only within careermate-network
    expose:
      - "6379"
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - careermate-network
    deploy:
      resources:
        limits:
          memory: 320m
          cpus: '0.25'

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  nginx_ssl:
    driver: local

networks:
  careermate-network:
    driver: bridge
