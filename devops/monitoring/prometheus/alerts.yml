groups:
  # ── Backend availability ──────────────────────────────────
  - name: careermate.backend
    rules:
      - alert: BackendDown
        expr: up{job="careermate-backend"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "CareerMate backend is down"
          description: "Backend has been unreachable for more than 1 minute."

      - alert: HighErrorRate
        expr: |
          rate(http_request_duration_seconds_count{status=~"5.."}[5m])
          /
          rate(http_request_duration_seconds_count[5m]) > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High HTTP 5xx error rate ({{ $value | humanizePercentage }})"
          description: "More than 5% of requests are returning 5xx errors over the last 5 minutes."

      - alert: SlowResponses
        expr: |
          histogram_quantile(0.95,
            rate(http_request_duration_seconds_bucket[5m])
          ) > 2
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "p95 response time > 2s"
          description: "95th percentile response time is {{ $value }}s, above the 2s threshold."

  # ── Database ──────────────────────────────────────────────
  - name: careermate.postgres
    rules:
      - alert: PostgresDown
        expr: up{job="postgres"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "PostgreSQL exporter is down"
          description: "Cannot reach postgres-exporter. Database may be unavailable."

      - alert: PostgresTooManyConnections
        expr: |
          pg_stat_activity_count > pg_settings_max_connections * 0.8
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "PostgreSQL connections at {{ $value | humanizePercentage }} of limit"
          description: "Connection pool is nearly exhausted."

      - alert: PostgresReplicationLag
        expr: pg_replication_lag > 60
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "PostgreSQL replication lag > 60s"
          description: "Replica is lagging by {{ $value }}s."

  # ── Redis ─────────────────────────────────────────────────
  - name: careermate.redis
    rules:
      - alert: RedisDown
        expr: up{job="redis"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Redis is down"
          description: "Redis exporter is unreachable. Cache and queues are likely broken."

      - alert: RedisHighMemory
        expr: redis_memory_used_bytes / redis_memory_max_bytes > 0.85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Redis memory usage > 85%"
          description: "Redis is using {{ $value | humanizePercentage }} of configured maxmemory."

  # ── Host OS ───────────────────────────────────────────────
  - name: careermate.host
    rules:
      - alert: HighCPU
        expr: 100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 85
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "CPU usage > 85% on {{ $labels.instance }}"
          description: "CPU has been above 85% for more than 10 minutes."

      - alert: LowDiskSpace
        expr: |
          (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}) < 0.15
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Disk space < 15% on {{ $labels.instance }}"
          description: "Root filesystem has only {{ $value | humanizePercentage }} free."

      - alert: HighMemoryUsage
        expr: |
          (1 - node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) > 0.90
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "RAM usage > 90% on {{ $labels.instance }}"
          description: "Memory pressure is very high — OOM kill risk."
