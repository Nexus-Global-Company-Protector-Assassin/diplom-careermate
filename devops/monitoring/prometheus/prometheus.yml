global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    project: careermate
    environment: production

rule_files:
  - alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

scrape_configs:
  # ── Prometheus self-monitoring ────────────────────────────
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  # ── CareerMate Backend (NestJS / prom-client) ─────────────
  - job_name: careermate-backend
    metrics_path: /api/v1/metrics
    static_configs:
      - targets: ['host.docker.internal:3001']
    # If running in production, replace with actual IP/hostname:
    # - targets: ['backend:3001']

  # ── Host OS (node-exporter) ────────────────────────────────
  - job_name: node
    static_configs:
      - targets: ['node-exporter:9100']

  # ── PostgreSQL ────────────────────────────────────────────
  - job_name: postgres
    static_configs:
      - targets: ['postgres-exporter:9187']

  # ── Redis ────────────────────────────────────────────────
  - job_name: redis
    static_configs:
      - targets: ['redis-exporter:9121']
